<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #18181b;
      color: #e4e4e7;
      padding: 24px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    h2 { font-size: 16px; font-weight: 600; color: #fff; }

    label {
      font-size: 12px;
      color: #a1a1aa;
      display: block;
      margin-bottom: 6px;
    }

    textarea, input[type="text"] {
      width: 100%;
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 8px;
      color: #e4e4e7;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      resize: vertical;
    }
    textarea { min-height: 100px; font-family: monospace; line-height: 1.6; }
    textarea:focus, input:focus { border-color: #6366f1; }

    .row { display: flex; gap: 8px; margin-top: auto; }

    button {
      flex: 1;
      padding: 9px 0;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }

    #btn-save   { background: #6366f1; color: #fff; }
    #btn-cancel { background: #27272a; color: #a1a1aa; }
    #btn-reset  { background: #3f3f46; color: #a1a1aa; flex: 0 0 auto; padding: 9px 14px; }

    .error { color: #f87171; font-size: 12px; min-height: 16px; }
  </style>
</head>
<body>
  <h2>⚙ Settings</h2>

  <div>
    <label>Home URL</label>
    <input id="home-url" type="text" placeholder="https://animepahe.pw" spellcheck="false" />
  </div>

  <div style="flex:1;display:flex;flex-direction:column;">
    <label>Allowed domains — one per line (subdomains included automatically)</label>
    <textarea id="whitelist" style="flex:1; min-height:80px"></textarea>
  </div>

  <div>
    <label>Cloudflare bypass cookie (optional)</label>
    <input id="cf-clearance" type="text" placeholder="Paste cf_clearance value from Chrome DevTools" spellcheck="false" />
    <p style="font-size:11px;color:#71717a;margin-top:6px;line-height:1.5">
      If the captcha loops: open the home URL in Chrome, complete the check, then copy the
      <code style="color:#a1a1aa">cf_clearance</code> cookie from DevTools → Application → Cookies.
    </p>
  </div>

  <div class="error" id="error"></div>

  <div class="row">
    <button id="btn-reset"  title="Restore defaults">↩ Reset</button>
    <button id="btn-cancel">Cancel</button>
    <button id="btn-save">Save &amp; Reload</button>
  </div>

  <script>
    const DEFAULT = {
      whitelist: ['animepahe.pw', 'kwik.si', 'kwik.cx', 'pahe.win'],
      homeUrl:   'https://animepahe.pw'
    };

    const homeInput = document.getElementById('home-url');
    const wlTextarea = document.getElementById('whitelist');
    const cfInput    = document.getElementById('cf-clearance');
    const errorEl   = document.getElementById('error');

    async function load() {
      const s = await window.kiosk.getSettings();
      homeInput.value  = s.homeUrl   || DEFAULT.homeUrl;
      wlTextarea.value = (s.whitelist || DEFAULT.whitelist).join('\n');
      cfInput.value    = s.cfClearance || '';
    }
    load();

    document.getElementById('btn-reset').addEventListener('click', () => {
      homeInput.value  = DEFAULT.homeUrl;
      wlTextarea.value = DEFAULT.whitelist.join('\n');
      errorEl.textContent = '';
    });

    document.getElementById('btn-cancel').addEventListener('click', () => window.close());

    document.getElementById('btn-save').addEventListener('click', async () => {
      const homeUrl = homeInput.value.trim();
      const whitelist = wlTextarea.value
        .split('\n')
        .map(l => l.trim().toLowerCase().replace(/^https?:\/\//i, '').replace(/\/.*/, ''))
        .filter(Boolean);

      if (!homeUrl) { errorEl.textContent = 'Home URL cannot be empty.'; return; }
      if (whitelist.length === 0) { errorEl.textContent = 'Whitelist cannot be empty.'; return; }

      try {
        await window.kiosk.saveSettings({
          homeUrl,
          whitelist,
          cfClearance: cfInput.value.trim()
        });
      } catch (e) {
        errorEl.textContent = 'Error saving: ' + e.message;
      }
    });
  </script>
</body>
</html>
